<div class="container ">

        <div class=" mb-3">

        <input name="title"  value={{task.title}} type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
</div>

    <label for="floatingTextarea">{{task.description}} </label>
</div>
